<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Arcade Space - Original Feel</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:radial-gradient(circle,#111827,#050816);overflow:hidden;font-family:Arial,sans-serif;color:#fff;min-height:100vh;display:flex;justify-content:center}
        
        /* --- MENÚS --- */
        .menu, .records-screen, .level-up-screen { position:fixed;inset:0;display:flex;justify-content:center;align-items:center;z-index:100; }
        .menu { background:rgba(0,0,0,.9); }
        .level-up-screen { background:rgba(0,0,0,0.6); display:none; }
        
        .menu-buttons{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;width:100%;max-width:900px;height:500px;background:url("Images/menu.png") no-repeat center;background-size:contain}

        .menu-btn, .back-btn, .level-display{
            display:flex;align-items:center;justify-content:center;gap:10px;
            width:280px;height:80px;
            border:none;outline:none;background:transparent;position:relative;
            font-size:1.1rem;font-weight:bold;color:#fff;cursor:pointer;transition:.2s;
            text-shadow:0 0 6px #000;
        }
        .menu-btn::before, .back-btn::before, .level-display::before{
            content:"";position:absolute;inset:0;background:url("Images/boton_base.png") no-repeat center;background-size:contain;z-index:-1;
        }

        /* --- POSICIONAMIENTO HACIA ARRIBA --- */
        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Mueve el juego arriba */
            padding-top: 15px; 
        }

        canvas {
            background: #000;
            border: 3px solid #00e5ff;
            border-radius: 10px;
            box-shadow: 0 0 20px #00e5ff;
            
            width: 96vw;          
            max-width: 800px; 
            height: auto;         
            max-height: 78vh;    /* Altura extendida hacia arriba */
            
            touch-action: none;
        }

        .hud {
            width: 96vw;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            color: #00e5ff;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .life-container{width:100px;height:14px;background:#111;border:2px solid #00e5ff;border-radius:20px;overflow:hidden}
        .life-bar{height:100%;background:lime;transition:.3s;width:100%}
        
        .records-screen{display:none; background:rgba(0,0,0,.95); z-index:110;}
        .records-content{position:relative;width:540px;height:540px;background:url("Images/records.png") no-repeat center;background-size:contain;display:flex;flex-direction:column;align-items:center;padding-top:110px}
    </style>
</head>
<body>

<div class="menu" id="menu">
    <div class="menu-buttons">
        <button class="menu-btn" id="playBtn"><img src="Images/iniciar.png" width="30"> <span>INICIAR</span></button>
        <button class="menu-btn" id="recordsBtn"><img src="Images/copa.png" width="30"> <span>RECORDS</span></button>
    </div>
</div>

<div class="level-up-screen" id="levelUpScreen">
    <button class="level-display" id="levelContinueBtn">
        <img src="Images/iniciar.png" width="20"> 
        <span id="levelUpText">NIVEL 1</span>
    </button>
</div>

<div class="records-screen" id="recordsScreen">
    <div class="records-content">
        <h2 style="margin-bottom:10px">TOP LOCAL</h2>
        <ol id="recordsList" style="list-style:none; padding:0;"></ol>
        <button class="back-btn" id="backBtn" style="margin-top:20px"><span>REGRESAR</span></button>
    </div>
</div>

<div class="game-container">
    <div class="hud">
        <div>❤️ <span id="lives">5</span></div>
        <div class="life-container"><div class="life-bar" id="lifeBar"></div></div>
        <div>⭐ <span id="score">0</span></div>
        <div>LV <span id="levelText">1</span></div>
    </div>
    <canvas id="game" width="800" height="500"></canvas>
</div>

<script>
const $ = e => document.getElementById(e);
const canvas = $("game"), ctx = canvas.getContext("2d");
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

// Carga de recursos
const wallImg = new Image(); wallImg.src = "Images/pared.png";
const brickLvl3 = new Image(); brickLvl3.src = "Images/ladrillo.png";
const ballImg = new Image(); ballImg.src = "Images/asteroide.png";
const powerupImg = new Image(); powerupImg.src = "Images/cometa.png";
const fireImg = new Image(); fireImg.src = "Images/fuego.png";
const hitImg = new Image(); hitImg.src = "Images/explosion.png";
const coinSnd = new Audio("Sounds/coin.mp3"), popSnd = new Audio("Sounds/burbuja.mp3");

const ui = {
    menu: $("menu"), play: $("playBtn"), records: $("recordsBtn"),
    list: $("recordsList"), score: $("score"), lives: $("lives"),
    life: $("lifeBar"), level: $("levelText"),
    levelUpScreen: $("levelUpScreen"), levelUpText: $("levelUpText"),
    levelContinueBtn: $("levelContinueBtn")
};

let score = 0, lives = 5, maxLives = 5, level = 1, nextLevelScore = 15;
let started = false, changingLevel = false, targetX = 340;
let right = false, left = false;
let balls = [], bricks = [], powerups = [], fireEffects = [], hitEffects = [];
let shakeTime = 0;

// Paleta con Colores y Estética Original
const paddleColors = ["#00e5ff", "#ff00ff", "#00ff00", "#ffff00", "#ff0000", "#ffffff"];
const paddle = { 
    width: isMobile ? 140 : 120, height: 15, x: 340, y: 460, speed: 8,
    color: "#00e5ff" 
};

const config = { rows: 3, cols: 10, w: 70, h: 25, p: 10, top: 70, left: 25 };

function updateHUD() {
    ui.lives.innerText = lives;
    ui.score.innerText = score;
    ui.level.innerText = level;
    ui.life.style.width = (lives / maxLives * 100) + "%";
}

const resetBall = () => ({
    x: canvas.width / 2, y: 400, r: 14,
    sx: (isMobile ? 2.8 : 3.5) * (1 + (level - 1) * 0.1),
    sy: (isMobile ? -2.8 : -3.5) * (1 + (level - 1) * 0.1)
});

function createBricks() {
    bricks = [];
    for (let c = 0; c < config.cols; c++) {
        bricks[c] = [];
        for (let r = 0; r < config.rows; r++) {
            bricks[c][r] = {
                x: c * (config.w + config.p) + config.left,
                y: r * (config.h + config.p) + config.top,
                status: 1,
                type: Math.random() > 0.85 ? "grow" : "normal"
            };
        }
    }
}

function nextLevel() {
    const noBricks = bricks.flat().every(b => !b.status);
    if (!noBricks && score < nextLevelScore) return;
    changingLevel = true;
    level++;
    nextLevelScore += 15;
    lives = Math.min(lives + 1, maxLives);
    updateHUD();
    ui.levelUpText.innerText = "NIVEL " + level;
    ui.levelUpScreen.style.display = "flex";
}

ui.levelContinueBtn.onclick = () => {
    ui.levelUpScreen.style.display = "none";
    createBricks();
    balls = [resetBall()];
    changingLevel = false;
};

function update() {
    if (!started || changingLevel) return;

    if (isMobile) paddle.x += (targetX - paddle.x) * 0.25;
    else {
        if (right && paddle.x + paddle.width < canvas.width) paddle.x += paddle.speed;
        if (left && paddle.x > 0) paddle.x -= paddle.speed;
    }
    paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));

    for (let i = balls.length - 1; i >= 0; i--) {
        let b = balls[i];
        b.x += b.sx; b.y += b.sy;

        if (b.x + b.r > canvas.width || b.x - b.r < 0) b.sx *= -1;
        if (b.y - b.r < 0) b.sy *= -1;

        // Rebote en paleta: FUNCIONALIDAD COLOR Y CRECIMIENTO
        if (b.sy > 0 && b.y + b.r >= paddle.y && b.y - b.r <= paddle.y + paddle.height &&
            b.x > paddle.x && b.x < paddle.x + paddle.width) {
            
            b.sy = -Math.abs(b.sy);
            score++; 
            
            // Efectos de la paleta
            paddle.color = paddleColors[Math.floor(Math.random() * paddleColors.length)];
            paddle.width += 2; 
            
            updateHUD();
            popSnd.currentTime = 0; popSnd.play().catch(()=>{});

            // Premio cada 10 puntos (Vida)
            if (score > 0 && score % 10 === 0) {
                powerups.push({ x: b.x, y: b.y, type: "life" });
            }
            nextLevel();
        }

        brickSearch: for (let c = 0; c < config.cols; c++) {
            for (let r = 0; r < config.rows; r++) {
                let bk = bricks[c][r];
                if (bk.status && b.x + b.r > bk.x && b.x - b.r < bk.x + config.w &&
                    b.y + b.r > bk.y && b.y - b.r < bk.y + config.h) {
                    bk.status = 0; b.sy *= -1;
                    hitEffects.push({ x: bk.x, y: bk.y, frame: 0, timer: 0 });
                    if (bk.type === "grow") powerups.push({ x: bk.x, y: bk.y, type: "grow" });
                    nextLevel();
                    break brickSearch;
                }
            }
        }

        if (b.y - b.r > canvas.height) {
            shakeTime = 10;
            fireEffects.push({ x: b.x - 40, y: paddle.y - 40, frame: 0, timer: 0 });
            balls.splice(i, 1);
            if (balls.length === 0) {
                lives--; updateHUD();
                if (lives <= 0) { 
                    saveRecord("Piloto", score);
                    location.reload(); 
                } else { balls.push(resetBall()); }
            }
        }
    }

    for (let i = powerups.length - 1; i >= 0; i--) {
        let p = powerups[i]; p.y += 2.5;
        if (p.y + 30 >= paddle.y && p.x + 30 > paddle.x && p.x < paddle.x + paddle.width) {
            if (p.type === "life") { lives = Math.min(lives + 1, maxLives); updateHUD(); }
            else if (p.type === "grow") { paddle.width += 30; }
            coinSnd.currentTime = 0; coinSnd.play().catch(()=>{});
            powerups.splice(i, 1);
        } else if (p.y > canvas.height) powerups.splice(i, 1);
    }
}

function draw() {
    ctx.save();
    if (shakeTime > 0) { ctx.translate(Math.random()*5, Math.random()*5); shakeTime--; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Paleta con Brillo
    ctx.fillStyle = paddle.color;
    ctx.shadowBlur = 15;
    ctx.shadowColor = paddle.color;
    ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
    ctx.shadowBlur = 0; 
    
    balls.forEach(b => ctx.drawImage(ballImg, b.x - b.r, b.y - b.r, b.r * 2, b.r * 2));
    
    for (let c = 0; c < config.cols; c++) {
        for (let r = 0; r < config.rows; r++) {
            let b = bricks[c][r];
            if (b.status) ctx.drawImage(level >= 3 ? brickLvl3 : wallImg, b.x, b.y, config.w, config.h);
        }
    }
    
    powerups.forEach(p => ctx.drawImage(powerupImg, p.x, p.y, 40, 40));

    fireEffects.forEach((f, i) => {
        ctx.drawImage(fireImg, Math.floor(f.frame)*128, 0, 128, 128, f.x, f.y, 80, 80);
        f.timer++; if (f.timer % 4 === 0) f.frame++;
        if (f.frame >= 6) fireEffects.splice(i, 1);
    });

    hitEffects.forEach((h, i) => {
        ctx.drawImage(hitImg, Math.floor(h.frame)*128, 0, 128, 128, h.x, h.y, 60, 60);
        h.timer++; if (h.timer % 4 === 0) h.frame++;
        if (h.frame >= 6) hitEffects.splice(i, 1);
    });
    ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

createBricks();
balls = [resetBall()];
updateHUD();

ui.play.onclick = () => { ui.menu.style.display = "none"; started = true; };
canvas.addEventListener("touchmove", e => {
    const rect = canvas.getBoundingClientRect();
    targetX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width) - paddle.width / 2;
    e.preventDefault();
}, { passive: false });

function saveRecord(n, s) {
    let r = JSON.parse(localStorage.getItem("records")) || [];
    r.push({ name: n, score: s });
    r.sort((a, b) => b.score - a.score);
    localStorage.setItem("records", JSON.stringify(r.slice(0, 5)));
}

ui.records.onclick = () => {
    ui.menu.style.display = "none"; $("recordsScreen").style.display = "flex";
    ui.list.innerHTML = (JSON.parse(localStorage.getItem("records")) || [])
        .map(r => `<li>${r.name}: ${r.score} pts</li>`).join("");
};
$("backBtn").onclick = () => { $("recordsScreen").style.display = "none"; ui.menu.style.display = "flex"; };

loop();
</script>
</body>
</html>
