<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Breakout Arcade</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{

  background:
  radial-gradient(circle,#111827,#050816);

  overflow:hidden;

  font-family:Arial,sans-serif;

  color:white;

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  touch-action:none;
}

.menu{

  position:fixed;

  width:100%;
  height:100%;

  display:flex;

  flex-direction:column;

  justify-content:center;
  align-items:center;

  background:
  rgba(0,0,0,0.92);

  z-index:10;

  padding:20px;
}

.menu h1{

  font-size:4rem;

  color:#00e5ff;

  margin-bottom:20px;

  text-align:center;

  text-shadow:
  0 0 10px #00e5ff,
  0 0 20px #00e5ff,
  0 0 40px #00e5ff;
}

.records-panel{

  display:none;

  margin-top:20px;

  width:320px;

  background:#09131f;

  border:2px solid #00e5ff;

  border-radius:15px;

  padding:20px;
}

.records-panel h2{

  text-align:center;

  margin-bottom:15px;

  color:#00e5ff;
}

.records-panel li{

  margin:8px 0;

  color:#8ff0c8;
}

button{

  padding:14px 30px;

  border:none;

  border-radius:12px;

  background:#8ff0c8;

  color:#083b2d;

  font-weight:bold;

  cursor:pointer;

  font-size:1rem;

  transition:0.3s;

  margin:10px;

  box-shadow:
  0 0 15px #8ff0c8;
}

button:active{

  transform:scale(0.96);
}

.game-container{

  width:100%;

  max-width:900px;

  display:flex;

  flex-direction:column;

  align-items:center;

  padding:10px;
}

.hud{

  width:100%;

  max-width:800px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:15px;

  margin-bottom:15px;

  flex-wrap:wrap;

  color:#00e5ff;

  font-weight:bold;
}

.life-container{

  width:200px;

  height:20px;

  background:#111;

  border:2px solid #00e5ff;

  border-radius:20px;

  overflow:hidden;
}

.life-bar{

  width:100%;

  height:100%;

  background:lime;

  transition:0.3s;
}

canvas{

  background:black;

  border:3px solid #00e5ff;

  border-radius:10px;

  box-shadow:
  0 0 20px #00e5ff;

  width:100%;

  max-width:800px;

  height:auto;

  touch-action:none;

  display:block;
}

.level-text{

  color:#ffbf00;

  font-size:1.2rem;

  font-weight:bold;
}

@media(max-width:768px){

  .menu h1{
    font-size:2.2rem;
  }

  .hud{

    justify-content:center;

    text-align:center;

    font-size:0.9rem;
  }

  .life-container{
    width:140px;
  }

  button{

    width:220px;

    font-size:0.9rem;
  }
}

</style>
</head>

<body>

<div class="menu" id="menu">

  <h1>BREAKOUT ARCADE</h1>

  <button id="playBtn">
    ▶️ INICIAR
  </button>

  <button id="recordsBtn">
    🏆 RECORDS
  </button>

  <div
  class="records-panel"
  id="recordsPanel">

    <h2>TOP 10</h2>

    <ol id="recordsList"></ol>

  </div>

</div>

<div class="game-container">

  <div class="hud">

    <div>
      ❤️ Vidas:
      <span id="lives">3</span>
    </div>

    <div class="life-container">

      <div
      class="life-bar"
      id="lifeBar">

      </div>

    </div>

    <div>
      ⭐ Score:
      <span id="score">0</span>
    </div>

    <div class="level-text">
      LEVEL:
      <span id="levelText">1</span>
    </div>

  </div>

  <canvas
  id="game"
  width="800"
  height="500">

  </canvas>

</div>

<script>

/* =========================
   CANVAS
========================= */

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

/* =========================
   MOBILE
========================= */

const isMobile =
/Android|iPhone|iPad|iPod/i.test(
navigator.userAgent
);

/* =========================
   AUDIO
========================= */

const coinSound =
new Audio("Sounds/coin.mp3");

const bubbleSound =
new Audio("Sounds/burbuja.mp3");

coinSound.volume = 0.7;
bubbleSound.volume = 0.7;

function unlockAudio(){

  [coinSound,bubbleSound]
  .forEach(sound=>{

    sound.play()
    .then(()=>{

      sound.pause();

      sound.currentTime = 0;

    })
    .catch(()=>{});

  });
}

/* =========================
   MENU
========================= */

const menu =
document.getElementById("menu");

const playBtn =
document.getElementById("playBtn");

const recordsBtn =
document.getElementById("recordsBtn");

const recordsPanel =
document.getElementById("recordsPanel");

const recordsList =
document.getElementById("recordsList");

/* =========================
   HUD
========================= */

const scoreText =
document.getElementById("score");

const livesText =
document.getElementById("lives");

const lifeBar =
document.getElementById("lifeBar");

const levelText =
document.getElementById("levelText");

/* =========================
   VARIABLES
========================= */

let score = 0;

let lives = 3;

let level = 1;

let gameStarted = false;

/* =========================
   PADDLE
========================= */

const originalPaddleWidth =
isMobile ? 170 : 120;

const paddle = {

  width:originalPaddleWidth,

  height:15,

  x:340,

  y:460,

  speed:8,

  color:"#00e5ff"
};

/* =========================
   CONTROLS
========================= */

let rightPressed = false;

let leftPressed = false;

/* =========================
   BRICKS
========================= */

const brickRows = 3;

const brickCols = 10;

const brickWidth = 70;

const brickHeight = 25;

const brickPadding = 10;

const brickOffsetTop = 50;

const brickOffsetLeft = 25;

let bricks = [];

/* =========================
   SPECIAL BLOCKS
========================= */

const cometBlocks = [];

const doubleBlocks = [];

while(cometBlocks.length < 7){

  let num =
  Math.floor(Math.random()*30);

  if(!cometBlocks.includes(num)){

    cometBlocks.push(num);
  }
}

while(doubleBlocks.length < 4){

  let num =
  Math.floor(Math.random()*30);

  if(
    !doubleBlocks.includes(num) &&
    !cometBlocks.includes(num)
  ){

    doubleBlocks.push(num);
  }
}

/* =========================
   CREATE BRICKS
========================= */

for(let c=0;c<brickCols;c++){

  bricks[c]=[];

  for(let r=0;r<brickRows;r++){

    let index =
    c * brickRows + r;

    bricks[c][r]={

      x:0,
      y:0,

      status:1,

      type:
      cometBlocks.includes(index)
      ? "comet"
      : doubleBlocks.includes(index)
      ? "double"
      : "normal"
    };
  }
}

/* =========================
   BALLS
========================= */

let balls = [

  {
    x:400,
    y:250,

    radius:10,

    speedX:isMobile ? 2.3 : 3,

    speedY:isMobile ? 2.3 : 3
  }
];

/* =========================
   POWERUPS
========================= */

let powerups = [];

/* =========================
   RECORDS
========================= */

function saveRecord(name,score){

  let records =
  JSON.parse(
    localStorage.getItem("records")
  ) || [];

  records.push({name,score});

  records.sort((a,b)=>
    b.score - a.score
  );

  records = records.slice(0,10);

  localStorage.setItem(
    "records",
    JSON.stringify(records)
  );
}

function showRecords(){

  recordsPanel.style.display =

  recordsPanel.style.display ===
  "block"

  ? "none"

  : "block";

  let records =
  JSON.parse(
    localStorage.getItem("records")
  ) || [];

  recordsList.innerHTML = "";

  records.forEach(r=>{

    const li =
    document.createElement("li");

    li.innerText =
    `${r.name} - ${r.score}`;

    recordsList.appendChild(li);
  });
}

recordsBtn.addEventListener(
"click",
showRecords
);

/* =========================
   START
========================= */

playBtn.addEventListener("click",()=>{

  unlockAudio();

  menu.style.display = "none";

  gameStarted = true;
});

/* =========================
   KEYBOARD
========================= */

document.addEventListener("keydown",e=>{

  if(e.key==="ArrowRight")
    rightPressed=true;

  if(e.key==="ArrowLeft")
    leftPressed=true;
});

document.addEventListener("keyup",e=>{

  if(e.key==="ArrowRight")
    rightPressed=false;

  if(e.key==="ArrowLeft")
    leftPressed=false;
});

/* =========================
   TOUCH
========================= */

function movePaddle(clientX){

  const rect =
  canvas.getBoundingClientRect();

  const scaleX =
  canvas.width / rect.width;

  let x =
  (clientX - rect.left) * scaleX;

  paddle.x =
  x - paddle.width / 2;

  if(paddle.x < 0){

    paddle.x = 0;
  }

  if(
    paddle.x + paddle.width >
    canvas.width
  ){

    paddle.x =
    canvas.width - paddle.width;
  }
}

canvas.addEventListener(
"touchstart",
e=>{

  movePaddle(
    e.touches[0].clientX
  );

  e.preventDefault();

},
{passive:false}
);

canvas.addEventListener(
"touchmove",
e=>{

  movePaddle(
    e.touches[0].clientX
  );

  e.preventDefault();

},
{passive:false}
);

/* =========================
   LEVEL COMPLETE
========================= */

function checkLevelComplete(){

  let remaining = 0;

  for(let c=0;c<brickCols;c++){

    for(let r=0;r<brickRows;r++){

      if(bricks[c][r].status === 1){

        remaining++;
      }
    }
  }

  if(remaining === 0){

    if(level === 1){

      level = 2;

      levelText.innerText = level;

      setTimeout(()=>{

        alert("🔥 LEVEL 2 🔥");

      },100);

      resetLevel2();

    }else{

      setTimeout(()=>{

        alert("🏆 GANASTE EL JUEGO 🏆");

        let playerName = prompt(
          "Ingresa tu nombre:"
        );

        if(playerName){

          saveRecord(
            playerName,
            score
          );
        }

        location.reload();

      },300);
    }
  }
}

/* =========================
   RESET LEVEL 2
========================= */

function resetLevel2(){

  paddle.width =
  originalPaddleWidth;

  paddle.color =
  "#ff3b3b";

  balls = [

    {

      x:400,
      y:250,

      radius:10,

      speedX:isMobile ? 3 : 4,

      speedY:isMobile ? 3 : 4
    }
  ];

  powerups = [];

  for(let c=0;c<brickCols;c++){

    for(let r=0;r<brickRows;r++){

      bricks[c][r].status = 1;
    }
  }
}

/* =========================
   LIFE BAR
========================= */

function updateLifeBar(){

  lifeBar.style.width =
  (lives/3)*100 + "%";
}

/* =========================
   DRAW PADDLE
========================= */

function drawPaddle(){

  ctx.fillStyle =
  paddle.color;

  ctx.fillRect(

    paddle.x,
    paddle.y,

    paddle.width,
    paddle.height
  );
}

/* =========================
   DRAW BALLS
========================= */

function drawBalls(){

  balls.forEach(ball=>{

    ctx.beginPath();

    ctx.arc(

      ball.x,
      ball.y,

      ball.radius,

      0,
      Math.PI*2
    );

    ctx.fillStyle="white";

    ctx.fill();

    ctx.closePath();
  });
}

/* =========================
   DRAW BRICKS
========================= */

function drawBricks(){

  for(let c=0;c<brickCols;c++){

    for(let r=0;r<brickRows;r++){

      let b = bricks[c][r];

      if(b.status==1){

        const brickX =
        (c*(brickWidth+brickPadding))
        + brickOffsetLeft;

        const brickY =
        (r*(brickHeight+brickPadding))
        + brickOffsetTop;

        b.x = brickX;
        b.y = brickY;

        if(b.type==="comet"){

          ctx.fillStyle="#b026ff";

        }else if(
          b.type==="double"
        ){

          ctx.fillStyle="#00e5ff";

        }else{

          ctx.fillStyle="#ff3b3b";
        }

        ctx.fillRect(

          brickX,
          brickY,

          brickWidth,
          brickHeight
        );

        ctx.fillStyle="white";

        ctx.font="18px Arial";

        if(b.type==="comet"){

          ctx.fillText(
            "☄️",
            brickX+22,
            brickY+18
          );
        }

        if(b.type==="double"){

          ctx.fillText(
            "⚪⚪",
            brickX+12,
            brickY+18
          );
        }
      }
    }
  }
}

/* =========================
   POWERUPS
========================= */

function drawPowerups(){

  powerups.forEach(p=>{

    ctx.font="28px Arial";

    ctx.fillText(
      p.icon,
      p.x,
      p.y
    );
  });
}

/* =========================
   UPDATE
========================= */

function update(){

  if(!gameStarted) return;

  if(
    rightPressed &&
    paddle.x+paddle.width<canvas.width
  ){

    paddle.x += paddle.speed;
  }

  if(
    leftPressed &&
    paddle.x>0
  ){

    paddle.x -= paddle.speed;
  }

  balls.forEach(ball=>{

    ball.x += ball.speedX;

    ball.y += ball.speedY;

    /* WALLS */

    if(
      ball.x+ball.radius>canvas.width ||
      ball.x-ball.radius<0
    ){

      ball.speedX *= -1;
    }

    if(ball.y-ball.radius<0){

      ball.speedY *= -1;
    }

    /* PADDLE */

    if(

      ball.y + ball.radius >
      paddle.y &&

      ball.x >
      paddle.x &&

      ball.x <
      paddle.x+paddle.width &&

      ball.speedY > 0

    ){

      let hitPoint =

      (ball.x -
      (paddle.x + paddle.width/2))

      / (paddle.width/2);

      ball.speedX =
      hitPoint * 5;

      ball.speedY =
      -Math.abs(ball.speedY);

      ball.y =
      paddle.y-ball.radius;

      bubbleSound.currentTime = 0;

      bubbleSound.play().catch(()=>{});

      score++;

      scoreText.innerText=score;

      /* ===== GROW 0.5% ===== */

      if(score % 5 === 0){

        if(level === 1){

          paddle.width *= 1.005;
        }

        const colors = [

          "#ffbf00",
          "#00e5ff",
          "#ff3b3b",
          "#8a2be2",
          "#00ff99",
          "#ff66cc"
        ];

        paddle.color =

        colors[
          Math.floor(
            Math.random()*colors.length
          )
        ];
      }

      /* ===== EXTRA BALL ===== */

      if(score % 20 === 0){

        balls.push({

          x:ball.x,
          y:ball.y,

          radius:10,

          speedX:-ball.speedX,

          speedY:ball.speedY
        });
      }
    }

    /* =========================
       BRICKS
    ========================= */

    for(let c=0;c<brickCols;c++){

      for(let r=0;r<brickRows;r++){

        let b = bricks[c][r];

        if(b.status==1){

          if(

            ball.x + ball.radius > b.x &&
            ball.x - ball.radius < b.x + brickWidth &&

            ball.y + ball.radius > b.y &&
            ball.y - ball.radius < b.y + brickHeight

          ){

            ball.speedY *= -1;

            b.status=0;

            checkLevelComplete();

            /* ===== COMET ===== */

            if(b.type==="comet"){

              powerups.push({

                x:b.x+20,
                y:b.y+20,

                icon:"☄️"
              });
            }

            /* ===== DOUBLE ===== */

            if(b.type==="double"){

              balls.push({

                x:ball.x,
                y:ball.y,

                radius:10,

                speedX:-ball.speedX,

                speedY:ball.speedY
              });
            }
          }
        }
      }
    }

    /* ===== LOSE LIFE ===== */

    if(ball.y > canvas.height){

      lives--;

      livesText.innerText=lives;

      updateLifeBar();

      ball.x=400;
      ball.y=250;

      ball.speedX=isMobile ? 2.3 : 3;

      ball.speedY=isMobile ? 2.3 : 3;

      if(lives<=0){

        let playerName = "";

        while(playerName.trim()===""){

          playerName = prompt(
            "GAME OVER\nIngresa tu nombre:"
          );

          if(playerName===null){

            playerName="";
          }
        }

        saveRecord(
          playerName,
          score
        );

        location.reload();
      }
    }

  });

  /* ===== POWERUPS ===== */

  powerups.forEach((p,index)=>{

    p.y += 3;

    if(

      p.y > paddle.y &&

      p.x > paddle.x &&

      p.x < paddle.x+paddle.width

    ){

      paddle.width *= 1.05;

      coinSound.currentTime = 0;

      coinSound.play().catch(()=>{});

      powerups.splice(index,1);
    }
  });
}

/* =========================
   LOOP
========================= */

function gameLoop(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  drawPaddle();

  drawBalls();

  drawBricks();

  drawPowerups();

  update();

  requestAnimationFrame(gameLoop);
}

updateLifeBar();

gameLoop();

</script>

</body>
</html>
