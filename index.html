<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Arcade</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box
}

body{
background:
radial-gradient(circle,#111827,#050816);
overflow:hidden;
font-family:Arial,sans-serif;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center
}

.menu{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.92);
z-index:10;
padding:20px
}

.menu-buttons{
display:flex;
flex-direction:column;
align-items:center;
gap:14px
}

.menu-btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:12px 24px;
border:none;
border-radius:12px;
background:#8ff0c8;
color:#083b2d;
font-weight:bold;
cursor:pointer;
font-size:1rem;
box-shadow:0 0 15px #8ff0c8;
transition:.2s;
min-width:220px
}

.menu-btn:hover{
transform:scale(1.05)
}

.menu-btn img{
width:28px;
height:28px;
object-fit:contain
}

.records-panel{
display:none;
margin-top:20px;
width:320px;
background:#09131f;
border:2px solid #00e5ff;
border-radius:15px;
padding:20px;
max-height:350px;
overflow:auto
}

.records-panel h2{
text-align:center;
margin-bottom:10px;
color:#00e5ff
}

.records-panel li{
margin:8px 0;
color:#8ff0c8
}

.game-container{
width:100%;
max-width:900px;
display:flex;
flex-direction:column;
align-items:center;
padding:10px
}

.hud{
width:100%;
max-width:800px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:10px;
color:#00e5ff
}

.life-container{
width:160px;
height:20px;
background:#111;
border:2px solid #00e5ff;
border-radius:20px;
overflow:hidden
}

.life-bar{
height:100%;
background:lime;
transition:.3s
}

canvas{
background:#000;
border:3px solid #00e5ff;
border-radius:10px;
box-shadow:0 0 20px #00e5ff;
width:100%;
max-width:800px;
touch-action:none
}

@media(max-width:768px){

.menu-btn{
width:220px
}

}

</style>
</head>

<body>

<div class="menu" id="menu">

<div class="menu-buttons">

<button
class="menu-btn"
id="playBtn">

<img
src="Images/iniciar.png">

<span>INICIAR</span>

</button>

<button
class="menu-btn"
id="recordsBtn">

<img
src="Images/copa.png">

<span>RECORDS</span>

</button>

</div>

<div
class="records-panel"
id="recordsPanel">

<h2>TOP LOCAL</h2>

<ol id="recordsList"></ol>

</div>

</div>

<div class="game-container">

<div class="hud">

<div>
❤️ <span id="lives">3</span>
</div>

<div class="life-container">
<div
class="life-bar"
id="lifeBar">
</div>
</div>

<div>
⭐ <span id="score">0</span>
</div>

<div>
LEVEL <span id="levelText">1</span>
</div>

</div>

<canvas
id="game"
width="800"
height="500">
</canvas>

</div>

<script>

/* =========================
   HELPERS
========================= */

const $ = e =>
document.getElementById(e);

const canvas = $("game");

const ctx =
canvas.getContext("2d");

const isMobile =
/Android|iPhone|iPad|iPod/i.test(
navigator.userAgent
);

/* =========================
   IMAGES
========================= */

const wallImage =
new Image();

wallImage.src =
"Images/pared.png";

const level3Image =
new Image();

level3Image.src =
"Images/ladrillo.png";

const asteroidImage =
new Image();

asteroidImage.src =
"Images/asteroide.png";

const cometSprite =
new Image();

cometSprite.src =
"Images/cometa.png";

const fireSprite =
new Image();

fireSprite.src =
"Images/fuego.png";

const hitSprite =
new Image();

hitSprite.src =
"Images/explosion.png";

/* =========================
   AUDIO
========================= */

const coin =
new Audio("Sounds/coin.mp3");

const pop =
new Audio("Sounds/burbuja.mp3");

/* =========================
   UI
========================= */

const ui = {

menu:$("menu"),

play:$("playBtn"),

records:$("recordsBtn"),

panel:$("recordsPanel"),

list:$("recordsList"),

score:$("score"),

lives:$("lives"),

life:$("lifeBar"),

level:$("levelText")
};

/* =========================
   GAME VARS
========================= */

let score = 0;

let lives = 3;

let level = 1;

let started = false;

let targetX = 340;

let right = false;

let left = false;

let powerups = [];

let balls = [];

let bricks = [];

let fireEffects = [];

let hitEffects = [];

/* =========================
   COLORS
========================= */

const colors = [

"#ffbf00",
"#00e5ff",
"#ff3b3b",
"#8a2be2",
"#00ff99",
"#ff66cc"
];

/* =========================
   PADDLE
========================= */

const paddle = {

base:isMobile ? 160 : 120,

width:isMobile ? 160 : 120,

height:15,

x:340,

y:460,

speed:isMobile ? 5 : 8,

color:"#00e5ff"
};

/* =========================
   BRICKS
========================= */

const config = {

rows:3,

cols:10,

w:70,

h:25,

p:10,

top:50,

left:25
};

/* =========================
   BALL
========================= */

const resetBall = () => ({

x:
Math.random()*
(canvas.width-100)+50,

y:
config.top+
(config.rows*(config.h+config.p))+
50,

r:14,

sx:
(isMobile ? 2 : 3)
* (1 + (level-1)*0.005),

sy:
(isMobile ? 2 : 3)
* (1 + (level-1)*0.005)
});

balls = [resetBall()];

/* =========================
   CREATE BRICKS
========================= */

function createBricks(){

bricks=[];

let comet=[];

let double=[];

while(comet.length<7){

let n=Math.floor(Math.random()*30);

if(!comet.includes(n))
comet.push(n);
}

while(double.length<4){

let n=Math.floor(Math.random()*30);

if(
!double.includes(n) &&
!comet.includes(n)
){
double.push(n);
}
}

for(let c=0;c<config.cols;c++){

bricks[c]=[];

for(let r=0;r<config.rows;r++){

let i=c*config.rows+r;

bricks[c][r]={

x:0,
y:0,

status:1,

type:
comet.includes(i)
? "comet"
: double.includes(i)
? "double"
: "normal"
};
}
}
}

createBricks();

/* =========================
   RECORDS
========================= */

function saveRecord(name,score){

let records =
JSON.parse(
localStorage.getItem("records")
) || [];

records.push({name,score});

records.sort((a,b)=>
b.score-a.score
);

records = records.slice(0,10);

localStorage.setItem(
"records",
JSON.stringify(records)
);
}

function showRecords(){

ui.panel.style.display =

ui.panel.style.display==="block"
? "none"
: "block";

let records =
JSON.parse(
localStorage.getItem("records")
) || [];

ui.list.innerHTML="";

records.forEach((r,i)=>{

let li =
document.createElement("li");

let medal =
["🥇","🥈","🥉"][i] || "";

li.innerText =
`${medal} ${r.name} - ${r.score}`;

ui.list.appendChild(li);

});
}

ui.records.onclick =
showRecords;

/* =========================
   START
========================= */

ui.play.onclick=()=>{

ui.menu.style.display="none";

started=true;

coin.play().catch(()=>{});
};

/* =========================
   CONTROLS
========================= */

addEventListener("keydown",e=>{

if(e.key==="ArrowRight")
right=true;

if(e.key==="ArrowLeft")
left=true;
});

addEventListener("keyup",e=>{

if(e.key==="ArrowRight")
right=false;

if(e.key==="ArrowLeft")
left=false;
});

canvas.addEventListener(
"touchmove",
e=>{

const rect =
canvas.getBoundingClientRect();

const scale =
canvas.width / rect.width;

targetX =

(e.touches[0].clientX-rect.left)

* scale

- paddle.width/2;

e.preventDefault();

},{passive:false});

/* =========================
   DRAW PADDLE
========================= */

function drawPaddle(){

ctx.fillStyle =
paddle.color;

ctx.fillRect(
paddle.x,
paddle.y,
paddle.width,
paddle.height
);
}

/* =========================
   DRAW BALLS
========================= */

function drawBalls(){

balls.forEach(b=>{

ctx.drawImage(

asteroidImage,

b.x-b.r,
b.y-b.r,

b.r*2,
b.r*2
);

});
}

/* =========================
   DRAW POWERUPS
========================= */

function drawPowerups(){

powerups.forEach(p=>{

ctx.drawImage(

cometSprite,

p.x,
p.y,

42,
42
);

});

}

/* =========================
   FIRE EFFECT
========================= */

function drawFireEffects(){

fireEffects.forEach((f,index)=>{

const frameWidth =
fireSprite.width / 6;

const frameHeight =
fireSprite.height;

ctx.drawImage(

fireSprite,

Math.floor(f.frame)*frameWidth,
0,

frameWidth,
frameHeight,

f.x,
f.y,

80,
80
);

f.timer++;

if(f.timer % 5 === 0){
f.frame++;
}

if(f.frame >= 6){

fireEffects.splice(index,1);
}

});
}

/* =========================
   HIT EFFECT
========================= */

function drawHitEffects(){

hitEffects.forEach((h,index)=>{

const frameWidth =
hitSprite.width / 6;

const frameHeight =
hitSprite.height;

ctx.drawImage(

hitSprite,

Math.floor(h.frame)*frameWidth,
0,

frameWidth,
frameHeight,

h.x,
h.y,

60,
60
);

h.timer++;

if(h.timer % 3 === 0){
h.frame++;
}

if(h.frame >= 6){

hitEffects.splice(index,1);
}

});
}

/* =========================
   DRAW BRICKS
========================= */

function drawBricks(){

for(let c=0;c<config.cols;c++){

for(let r=0;r<config.rows;r++){

let b=bricks[c][r];

if(!b.status)
continue;

let x=
c*(config.w+config.p)
+ config.left;

let y=
r*(config.h+config.p)
+ config.top;

b.x=x;
b.y=y;

if(b.type==="double"){

ctx.shadowColor="#ffd700";

ctx.shadowBlur=25;

}else{

ctx.shadowBlur=0;
}

ctx.drawImage(

level>=3
? level3Image
: wallImage,

x,
y,

config.w,
config.h
);

ctx.shadowBlur=0;

}
}
}

/* =========================
   NEXT LEVEL
========================= */

function nextLevel(){

const noBricks =
bricks.flat().every(
b=>!b.status
);

const byScore =
score >= level*15;

if(noBricks || byScore){

level++;

ui.level.innerText =
level;

lives++;

ui.lives.innerText =
lives;

balls=[resetBall()];

powerups=[];

createBricks();

alert(
"LEVEL "+level
);
}
}

/* =========================
   UPDATE
========================= */

function update(){

if(!started)
return;

/* MOBILE */

if(isMobile){

paddle.x +=

(targetX-paddle.x)
* 0.22;

paddle.x = Math.max(

0,

Math.min(
canvas.width-paddle.width,
paddle.x
));
}

/* PC */

if(
right &&
paddle.x+paddle.width<canvas.width
){
paddle.x += paddle.speed;
}

if(
left &&
paddle.x>0
){
paddle.x -= paddle.speed;
}

/* BALLS */

for(let i=balls.length-1;i>=0;i--){

let ball = balls[i];

ball.x += ball.sx;

ball.y += ball.sy;

if(
ball.x+ball.r>canvas.width ||
ball.x-ball.r<0
){
ball.sx *= -1;
}

if(ball.y-ball.r<0){
ball.sy *= -1;
}

if(

ball.y+ball.r>paddle.y &&

ball.x>paddle.x &&

ball.x<paddle.x+paddle.width &&

ball.sy>0

){

ball.sy =
-Math.abs(ball.sy);

score++;

ui.score.innerText =
score;

pop.currentTime=0;

pop.play().catch(()=>{});

if(score%5===0){

paddle.width *= 1.005;

paddle.color =

colors[
Math.floor(
Math.random()*colors.length
)];
}

if(score%20===0){

balls.push({

...resetBall(),

x:ball.x,

y:ball.y,

sx:-ball.sx,

sy:ball.sy
});
}

nextLevel();
}

/* BRICKS */

for(let c=0;c<config.cols;c++){

for(let r=0;r<config.rows;r++){

let b=bricks[c][r];

if(!b.status)
continue;

if(

ball.x+ball.r>b.x &&

ball.x-ball.r<b.x+config.w &&

ball.y+ball.r>b.y &&

ball.y-ball.r<b.y+config.h

){

b.status=0;

ball.sy *= -1;

hitEffects.push({

x:b.x+5,

y:b.y-10,

frame:0,

timer:0
});

if(b.type==="comet"){

powerups.push({

x:b.x+15,

y:b.y
});
}

if(b.type==="double"){

balls.push({

...resetBall(),

x:ball.x,

y:ball.y,

sx:-ball.sx,

sy:ball.sy
});
}

nextLevel();

break;
}
}
}

if(ball.y>canvas.height){

fireEffects.push({

x:ball.x-40,

y:paddle.y-3,

frame:0,

timer:0
});

if(balls.length>1){

balls.splice(i,1);

continue;
}

lives--;

ui.lives.innerText=lives;

ui.life.style.width=
Math.max((lives/5)*100,0)
+"%";

Object.assign(
ball,
resetBall()
);

if(lives<=0){

let name="";

while(!name.trim()){

name = prompt(
"GAME OVER\nIngresa tu nombre:"
) || "";
}

saveRecord(name,score);

location.reload();
}
}
}

/* POWERUPS */

for(let i=powerups.length-1;i>=0;i--){

let p = powerups[i];

/* MÁS RÁPIDO */

p.y += 0.70;

/* ATRAPAR */

if(

p.y + 42 >= paddle.y &&

p.x > paddle.x &&

p.x < paddle.x + paddle.width

){

paddle.width *= 1.15;

paddle.color =

colors[
Math.floor(
Math.random()*colors.length
)];

coin.currentTime = 0;

coin.play().catch(()=>{});

powerups.splice(i,1);

continue;
}

/* DESAPARECER CERCA DE LA BARRA */

if(p.y >= paddle.y + 10){

powerups.splice(i,1);
}
}
}

/* =========================
   LOOP
========================= */

function loop(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

drawPaddle();

drawBalls();

drawBricks();

drawPowerups();

drawFireEffects();

drawHitEffects();

update();

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
